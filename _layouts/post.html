---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {%- if page.tags.size > 0 -%}
        &nbsp;·&nbsp;
        {%- for tag in page.tags -%}
          <span class="tag">{{ tag }}</span>
        {%- endfor -%}
      {%- endif -%}
      {%- if page.repo -%}
        &nbsp;·&nbsp; <a href="{{ page.repo }}" target="_blank" rel="noopener">Code and data</a>
      {%- endif -%}
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
